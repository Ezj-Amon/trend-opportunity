<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}趋势选品助手{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', path='/favicon.svg') }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ url_for('static', path='/app.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">Trend Opportunity Lab</a>
    <span class="tag">真实数据 · 证据优先</span>
    <nav class="topnav"><a href="/">全球趋势</a><a href="/research">研究队列</a><a href="/semantic-review">语义评测</a><a href="/signals">新品机会线索</a><a href="/hypotheses">商品假设</a><a href="/validation">市场验证</a><a href="/recommendations">已验证推荐</a></nav>
  </header>
  <main class="container">{% block content %}{% endblock %}</main>
  <div id="toast" class="toast" hidden></div>
  <script>
    function toast(message, error=false) {
      const node = document.getElementById('toast');
      node.textContent = message; node.hidden = false;
      node.className = error ? 'toast error' : 'toast';
      setTimeout(() => node.hidden = true, 4000);
    }
    async function postAction(url, successMessage, data=null) {
      const token = localStorage.getItem('trendAdminToken');
      const headers = token ? {'X-Admin-Token': token} : {};
      if (data !== null) headers['Content-Type'] = 'application/json';
      const response = await fetch(url, {
        method: 'POST', headers,
        body: data === null ? undefined : JSON.stringify(data)
      });
      let body = {}; try { body = await response.json(); } catch (_) {}
      if (!response.ok) { toast(body.detail || '操作失败', true); return null; }
      if (successMessage) toast(successMessage);
      return body;
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
